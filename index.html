<div class="header">
  <h1><span>PRACTILED</span> — Semáforo de Publicaciones</h1>
  <p>Análisis de ventas de MercadoLibre · <span id="date"></span></p>
</div>

<div class="dashboard">
  <div class="cards">
    <div class="card card-all active" onclick="filterBy('all')">
      <div class="count" id="count-all">0</div>
      <div class="label">Total</div>
      <div class="bar"></div>
    </div>
    <div class="card card-green" onclick="filterBy('green')">
      <div class="count" id="count-green">0</div>
      <div class="label">Más vendidos (+20)</div>
      <div class="bar"></div>
    </div>
    <div class="card card-orange" onclick="filterBy('orange')">
      <div class="count" id="count-orange">0</div>
      <div class="label">Pocas ventas (1-20)</div>
      <div class="bar"></div>
    </div>
    <div class="card card-red" onclick="filterBy('red')">
      <div class="count" id="count-red">0</div>
      <div class="label">Sin ventas (0)</div>
      <div class="bar"></div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search" placeholder="Buscar publicación..." oninput="onSearch(this.value)">
    <button class="sort-btn active" onclick="sortBy('sold-desc', this)">Mayor venta</button>
    <button class="sort-btn" onclick="sortBy('sold-asc', this)">Menor venta</button>
    <button class="sort-btn" onclick="sortBy('price-desc', this)">Mayor precio</button>
    <button class="sort-btn" onclick="sortBy('revenue-desc', this)">Mayor facturación</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:30px"></th>
          <th style="width:50px"></th>
          <th>Publicación</th>
          <th style="width:100px" onclick="sortBy('price-desc')">Precio</th>
          <th style="width:100px" onclick="sortBy('sold-desc')">Vendidos</th>
          <th style="width:120px" onclick="sortBy('revenue-desc')">Facturación</th>
          <th style="width:80px">Stock</th>
          <th style="width:80px">Estado</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="pagination">
      <button onclick="changePage(-1)" id="prev-btn">← Anterior</button>
      <span id="page-info"></span>
      <button onclick="changePage(1)" id="next-btn">Siguiente →</button>
    </div>
  </div>
</div>

<div class="footer">
  Semáforo PRACTILED · Datos de MercadoLibre API · Generado por Claude Code
</div>

<script>
let DATA = [];
let filtered = [];
let currentFilter = 'all';
let currentSearch = '';
let currentSort = 'sold-desc';
let page = 0;
const PAGE_SIZE = 50;

function getColor(sold) {
  if (sold > 20) return 'green';
  if (sold > 0) return 'orange';
  return 'red';
}

function formatPrice(n) {
  return '$' + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 0 });
}

function filterBy(color) {
  currentFilter = color;
  page = 0;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.querySelector('.card-' + color).classList.add('active');
  applyFilters();
}

function onSearch(val) {
  currentSearch = val.toLowerCase();
  page = 0;
  applyFilters();
}

function sortBy(key, btn) {
  currentSort = key;
  page = 0;
  if (btn) {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  applyFilters();
}

function changePage(dir) {
  page += dir;
  render();
}

function applyFilters() {
  filtered = DATA.filter(item => {
    if (currentFilter !== 'all' && getColor(item.sold) !== currentFilter) return false;
    if (currentSearch && !item.title.toLowerCase().includes(currentSearch) && !item.id.toLowerCase().includes(currentSearch)) return false;
    return true;
  });

  const [field, dir] = currentSort.split('-');
  filtered.sort((a, b) => {
    let va, vb;
    if (field === 'revenue') { va = a.price * a.sold; vb = b.price * b.sold; }
    else { va = a[field]; vb = b[field]; }
    return dir === 'desc' ? vb - va : va - vb;
  });

  render();
}

function render() {
  const start = page * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const pageItems = filtered.slice(start, end);
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = pageItems.map(item => {
    const color = getColor(item.sold);
    const revenue = item.price * item.sold;
    return `<tr>
      <td><span class="semaforo ${color}"></span></td>
      <td><img class="thumb" src="${item.thumbnail || ''}" onerror="this.style.display='none'" loading="lazy"></td>
      <td class="item-title"><a href="${item.permalink || '#'}" target="_blank">${item.title}</a></td>
      <td class="price">${formatPrice(item.price)}</td>
      <td><span class="sold-badge ${color}">${item.sold}</span></td>
      <td style="color:#888">${formatPrice(revenue)}</td>
      <td class="${item.stock === 0 ? 'stock-zero' : ''}">${item.stock}</td>
      <td style="font-size:11px;color:${item.status === 'active' ? '#22c55e' : '#ef4444'}">${item.status}</td>
    </tr>`;
  }).join('');

  document.getElementById('page-info').textContent = `${page + 1} / ${totalPages || 1} (${filtered.length} items)`;
  document.getElementById('prev-btn').disabled = page === 0;
  document.getElementById('next-btn').disabled = end >= filtered.length;
}

function init(data) {
  DATA = data;
  document.getElementById('date').textContent = new Date().toLocaleDateString('es-AR');
  document.getElementById('count-all').textContent = data.length;
  document.getElementById('count-green').textContent = data.filter(i => i.sold > 20).length;
  document.getElementById('count-orange').textContent = data.filter(i => i.sold > 0 && i.sold <= 20).length;
  document.getElementById('count-red').textContent = data.filter(i => i.sold === 0).length;
  filtered = [...data];
  filtered.sort((a, b) => b.sold - a.sold);
  render();
}
