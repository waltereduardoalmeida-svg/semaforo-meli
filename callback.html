<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRACTILED - Autorización MercadoLibre</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e1e1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 16px; padding: 40px; max-width: 500px; text-align: center; }
  h1 { font-size: 22px; margin-bottom: 10px; }
  h1 span { color: #ffe600; }
  .status { margin: 20px 0; font-size: 14px; color: #888; }
  .code-box { background: #0f1117; border: 2px solid #22c55e; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; word-break: break-all; color: #22c55e; margin: 16px 0; user-select: all; cursor: pointer; }
  .code-box.error { border-color: #ef4444; color: #ef4444; }
  .hint { font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="card">
  <h1><span>PRACTILED</span> — MercadoLibre</h1>
  <div class="status" id="status">Procesando autorización...</div>
  <div class="code-box" id="code"></div>
  <div class="hint" id="hint"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  if (code) {
    document.getElementById('status').textContent = 'Autorización exitosa';
    document.getElementById('code').textContent = code;
    document.getElementById('hint').textContent = 'Copiá este código y pasáselo a Claude Code';
  } else if (error) {
    document.getElementById('status').textContent = 'Error en la autorización';
    document.getElementById('code').textContent = error;
    document.getElementById('code').classList.add('error');
  } else {
    document.getElementById('status').textContent = 'No se recibió código';
    document.getElementById('code').textContent = 'Usá el link de autorización que te da Claude Code';
    document.getElementById('code').classList.add('error');
  }
</script>
</body>
</html>
